<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alexandra Zhukova 3D Model Showcase</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <!-- Optional extras for teleport + interactions -->
    <script src="https://unpkg.com/aframe-teleport-controls@4.0.1/dist/aframe-teleport-controls.min.js"></script>
    <script src="https://unpkg.com/super-hands@^3.0.0/dist/super-hands.min.js"></script>
    <!-- Adds movement-controls (gamepad/thumbstick locomotion) -->
    <script src="https://unpkg.com/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    <!-- Adds movement-controls (gamepad/thumbstick locomotion) -->
    <script src="https://unpkg.com/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    <!-- Adds movement-controls (gamepad/thumbstick locomotion) -->
    <script src="https://unpkg.com/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
        
    <style>
      /* Enter VR UI button */
      #enterVrBtn {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 9999;
        padding: 10px 14px;
        font-size: 14px;
        border: none;
        border-radius: 6px;
        background: #1e88e5;
        color: white;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        display: none; /* hidden until we check support */
      }
      #enterVrBtn:active { transform: translateY(1px); }
    </style>
  </head>
  <body>
    <button id="enterVrBtn" aria-pressed="false">Enter VR</button>

    <a-scene>
      <a-assets>
        <a-asset-item id="friendopede" src="Friendopede.glb"></a-asset-item>
        <a-asset-item id="Adora" src="Adora.glb"></a-asset-item>
        <a-asset-item id="rockruff" src="rockruff.glb"></a-asset-item>
        <img id="darksky" src="dark-sky.jpeg">
      </a-assets>

      <!-- Ground -->
      <a-plane position="0 0 -4" rotation="-90 0 0" width="10" height="20" color="#7BC8A4" shadow="receive: true"></a-plane>

      <!-- Lighting -->
      <a-light type="ambient" color="#717e8f" intensity="0.25"></a-light>

      <!-- Spotlight positioned above the model and pointing straight down (perpendicular to plane).
           angle is specified in radians (use ~0.35 for ~20° cone). -->
      <a-entity
        id="friendopedeLight"
        position="1 4 -4"
        rotation="-90 0 0"
        light="type: spot; color: #ffffff; intensity: 5; distance: 15; angle: 0.5; penumbra: 0.4; decay: 1; castShadow: true">
      </a-entity>

      <!-- Models (make them "clickable" so raycasters can target them) -->
      <a-entity id="friendopedeEntity" gltf-model="#friendopede" position="1 0 -4" class="clickable" shadow="cast: true"></a-entity>
      <a-entity gltf-model="#Adora" position="1 0.8 -6" scale="0.08 0.08 0.08" rotation="0 -90 0" class="clickable"></a-entity>
      <a-entity gltf-model="#rockruff" position="1 0 -2" scale="0.3 0.3 0.3" rotation="0 -90 0" class="clickable"></a-entity>

      <!-- Camera Rig: camera + controllers -->
      <a-entity id="cameraRig" position="0 0 0">
        <!-- Head / Camera -->
        <a-entity id="camera" camera look-controls wasd-controls position="0 1.6 0">
          <!-- Gaze / Mouse cursor -->
          <a-entity
            cursor="fuse: false; rayOrigin: mouse"
            raycaster="objects: .clickable"
            position="0 0 -1"
            geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02"
            material="color: black; shader: flat">
          </a-entity>
        </a-entity>

        <!-- Controllers -->
        <a-entity id="leftHand" laser-controls="hand: left" teleport-controls="cameraRig: #cameraRig; teleportOrigin: #camera; button: grip" super-hands></a-entity>
        <a-entity id="rightHand" laser-controls="hand: right" teleport-controls="cameraRig: #cameraRig; teleportOrigin: #camera; button: trigger" super-hands></a-entity>
      </a-entity>

      <!-- Environment -->
      <a-sky src="#darksky"></a-sky>
    </a-scene>

    <script>
      (function() {
        const btn = document.getElementById('enterVrBtn');
        const scene = document.querySelector('a-scene');

        if (!scene || !btn) return;

        // Update label and aria-pressed when VR state changes
        function updateButtonLabel() {
          try {
            const inVr = scene.is('vr-mode'); // A-Frame flag for VR mode
            btn.textContent = inVr ? 'Exit VR' : 'Enter VR';
            btn.setAttribute('aria-pressed', String(inVr));
          } catch (e) {
            btn.textContent = 'Enter VR';
            btn.setAttribute('aria-pressed', 'false');
          }
        }

        // Hook A-Frame events to keep label in sync
        scene.addEventListener('enter-vr', updateButtonLabel);
        scene.addEventListener('exit-vr', updateButtonLabel);

        // Click toggles VR mode (user gesture required by WebXR)
        btn.addEventListener('click', function () {
          try {
            if (scene.is('vr-mode')) {
              scene.exitVR();
            } else {
              scene.enterVR();
            }
          } catch (err) {
            // fallback: try calling built-in method directly
            if (typeof scene.enterVR === 'function') scene.enterVR();
          }
        });

        // Feature detection: show the button only if immersive VR is supported.
        // navigator.xr.isSessionSupported returns a promise.
        if (navigator.xr && typeof navigator.xr.isSessionSupported === 'function') {
          navigator.xr.isSessionSupported('immersive-vr').then(function (supported) {
            if (supported) {
              btn.style.display = 'block';
              updateButtonLabel();
            } else {
              // Not supported: still show a button for A-Frame fullscreen/inline fallback if desired
              // Comment out the next line if you want to hide the button on unsupported devices
              btn.style.display = 'block';
            }
          }).catch(function () {
            // conservative fallback: show the button (A-Frame may handle older browsers)
            btn.style.display = 'block';
          });
        } else {
          // No WebXR API detected — show the button so A-Frame can still attempt enterVR (fullscreen/fallback)
          btn.style.display = 'block';
        }
      })();
    </script>
  </body>
</html>
