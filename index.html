<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alexandra Zhukova 3D Model Showcase</title>
    <!-- A-Frame Core -->
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <!-- Teleport Controls -->
    <script src="https://unpkg.com/aframe-teleport-controls@4.0.1/dist/aframe-teleport-controls.min.js"></script>
    <!-- Interactions -->
    <script src="https://unpkg.com/super-hands@^3.0.0/dist/super-hands.min.js"></script>
    <!-- Movement & GLTF extras -->
    <script src="https://unpkg.com/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
        
    <style>
      body { margin: 0; overflow: hidden; }
      #enterVrBtn {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 9999;
        padding: 12px 20px;
        font-family: sans-serif;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        border: none;
        border-radius: 8px;
        background: #1e88e5;
        color: white;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        display: none; 
        transition: background 0.2s;
      }
      #enterVrBtn:hover { background: #1565c0; }
      #enterVrBtn:active { transform: translateY(2px); }
    </style>
  </head>
  <body>
    <button id="enterVrBtn" aria-pressed="false">Enter VR</button>

    <a-scene shadow="type: pcfsoft">
      <a-assets>
        <!-- Placeholders for your assets -->
        <a-asset-item id="friendopede" src="Friendopede.glb"></a-asset-item>
        <a-asset-item id="Adora" src="Adora.glb"></a-asset-item>
        <a-asset-item id="rockruff" src="rockruff.glb"></a-asset-item>
        <img id="darksky" src="dark-sky.jpeg">
      </a-assets>

      <!-- Ground -->
      <a-plane 
        position="0 0 -4" 
        rotation="-90 0 0" 
        width="20" 
        height="20" 
        color="#7BC8A4" 
        shadow="receive: true">
      </a-plane>

      <!-- Global Ambient Lighting (less dark now) -->
      <a-light type="ambient" color="#555" intensity="0.5"></a-light>

      <!-- 1. Spotlight for Rockruff (Front) -->
      <a-entity
        id="rockruffLight"
        position="1 4 -2"
        rotation="-90 0 0"
        light="type: spot; color: #ffffff; intensity: 15; distance: 10; angle: 45; penumbra: 0.5; castShadow: true">
      </a-entity>
      <a-entity 
        id="rockruffEntity" 
        gltf-model="#rockruff" 
        position="1 0 -2" 
        scale="0.3 0.3 0.3" 
        rotation="0 -90 0" 
        class="clickable" 
        shadow="cast: true">
      </a-entity>

      <!-- 2. Spotlight for Friendopede (Middle) -->
      <a-entity
        id="friendopedeLight"
        position="1 4 -4"
        rotation="-90 0 0"
        light="type: spot; color: #ffffff; intensity: 15; distance: 10; angle: 45; penumbra: 0.5; castShadow: true">
      </a-entity>
      <a-entity 
        id="friendopedeEntity" 
        gltf-model="#friendopede" 
        position="1 0 -4" 
        class="clickable" 
        shadow="cast: true">
      </a-entity>

      <!-- 3. Spotlight for Adora (Back) - raised and wider radius -->
      <a-entity
        id="adoraLight"
        position="1 6 -6"
        rotation="-90 0 0"
        light="type: spot; color: #ffffff; intensity: 18; distance: 20; angle: 60; penumbra: 0.5; castShadow: true">
      </a-entity>
      <a-entity 
        id="adoraEntity" 
        gltf-model="#Adora" 
        position="1 0.8 -6" 
        scale="0.08 0.08 0.08" 
        rotation="0 -90 0" 
        class="clickable" 
        shadow="cast: true">
      </a-entity>

      <!-- Camera Rig -->
      <a-entity id="cameraRig">
        <!-- Head -->
        <a-entity id="camera" camera look-controls wasd-controls position="0 1.6 0">
          <a-entity
            cursor="fuse: false; rayOrigin: mouse"
            raycaster="objects: .clickable"
            position="0 0 -1"
            geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.015"
            material="color: #00ff00; shader: flat; opacity: 0.5">
          </a-entity>
        </a-entity>

        <!-- Hands -->
        <a-entity 
            id="leftHand" 
            laser-controls="hand: left" 
            teleport-controls="cameraRig: #cameraRig; teleportOrigin: #camera; button: grip" 
            super-hands>
        </a-entity>
        <a-entity 
            id="rightHand" 
            laser-controls="hand: right" 
            teleport-controls="cameraRig: #cameraRig; teleportOrigin: #camera; button: trigger" 
            super-hands>
        </a-entity>
      </a-entity>

      <!-- Sky -->
      <a-sky src="#darksky"></a-sky>
    </a-scene>

    <script>
      (function() {
        const btn = document.getElementById('enterVrBtn');
        const scene = document.querySelector('a-scene');

        if (!scene || !btn) return;

        function updateButtonLabel() {
          const inVr = scene.is('vr-mode');
          btn.textContent = inVr ? 'Exit VR' : 'Enter VR';
          btn.setAttribute('aria-pressed', String(inVr));
        }

        scene.addEventListener('enter-vr', updateButtonLabel);
        scene.addEventListener('exit-vr', updateButtonLabel);

        btn.addEventListener('click', function () {
          if (scene.is('vr-mode')) {
            scene.exitVR();
          } else {
            scene.enterVR();
          }
        });

        if (navigator.xr && typeof navigator.xr.isSessionSupported === 'function') {
          navigator.xr.isSessionSupported('immersive-vr').then(function (supported) {
            btn.style.display = 'block';
            updateButtonLabel();
          }).catch(function () {
            btn.style.display = 'block';
          });
        } else {
          btn.style.display = 'block';
        }
      })();
    </script>
  </body>
</html>
