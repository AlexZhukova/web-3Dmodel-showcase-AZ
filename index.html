<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexandra Zhukova 3D Model Showcase</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-asset-item id="friendopede" src="Friendopede.glb"></a-asset-item>
        <a-asset-item id="Adora" src="Adora.glb"></a-asset-item>
      </a-assets>
      <!--Ground>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>
      <!-- 3D Models -->
      <a-entity gltf-model="#friendopede" position="1 0 -4"></a-entity>
      <a-entity gltf-model="#Adora" position="2 0 -4"></a-entity>
      <!-- Environment -->
      <a-sky color="#ECECEC"></a-sky>
    </a-scene>
  </body>
</html>
