<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alexandra Zhukova 3D Model Showcase</title>
    <!-- A-Frame Core -->
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <!-- Teleport Controls -->
    <script src="https://unpkg.com/aframe-teleport-controls@4.0.1/dist/aframe-teleport-controls.min.js"></script>
    <!-- Interactions -->
    <script src="https://unpkg.com/super-hands@^3.0.0/dist/super-hands.min.js"></script>
    <!-- Movement & GLTF extras -->
    <script src="https://unpkg.com/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
        
    <style>
      body { margin: 0; overflow: hidden; }
      /* Enter VR button (existing) */
      #enterVrBtn {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 9999;
        padding: 12px 20px;
        font-family: sans-serif;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        border: none;
        border-radius: 8px;
        background: #1e88e5;
        color: white;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        display: none; 
        transition: background 0.2s;
      }
      #enterVrBtn:hover { background: #1565c0; }
      #enterVrBtn:active { transform: translateY(2px); }

      /* Last-changed UI: same style, opposite corner */
      #lastUpdatedBtn {
        position: fixed;
        left: 20px;
        bottom: 20px;
        z-index: 9999;
        padding: 10px 16px;
        font-family: sans-serif;
        font-weight: bold;
        text-transform: none;
        letter-spacing: 0.2px;
        border: none;
        border-radius: 8px;
        background: #1e88e5;
        color: white;
        cursor: default;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        display: none;
        transition: background 0.2s;
        opacity: 0.95;
      }
      #lastUpdatedBtn small { display:block; font-weight: normal; font-size: 11px; opacity: 0.9; }
      #lastUpdatedBtn:hover { background: #1565c0; }
    </style>
  </head>
  <body>
    <button id="enterVrBtn" aria-pressed="false">Enter VR</button>
    <button id="lastUpdatedBtn" aria-hidden="false">Last changed<br><small>—</small></button>

    <a-scene shadow="type: pcfsoft">
      <a-assets>
        <!-- Placeholders for assets -->
        <a-asset-item id="friendopede" src="Friendopede.glb"></a-asset-item>
        <a-asset-item id="Adora" src="Adora.glb"></a-asset-item>
        <a-asset-item id="rockruff" src="rockruff.glb"></a-asset-item>
        <img id="darksky" src="dark-sky.jpeg">
      </a-assets>

      <!-- Ground: use PBR standard material with low metalness and higher roughness
           to reduce glossiness but keep some reflection -->
      <a-plane 
        position="0 0 -4" 
        rotation="-90 0 0" 
        width="20" 
        height="20" 
        shadow="receive: true"
        material="shader: standard; color: #7BC8A4; metalness: 0.04; roughness: 0.9; envMapIntensity: 0.4">
      </a-plane>

      <!-- Global Ambient Lighting (less dark now) -->
      <a-light type="ambient" color="#555" intensity="0.55"></a-light>

      <!-- 1. Spotlight for Rockruff (Front) -->
      <a-entity
        id="rockruffLight"
        position="1 4 -2"
        rotation="-90 0 0"
        light="type: spot; color: #ffffff; intensity: 15; distance: 10; angle: 45; penumbra: 0.5; decay: 1; castShadow: true">
      </a-entity>
      <a-entity 
        id="rockruffEntity" 
        gltf-model="#rockruff" 
        position="1 0 -2" 
        scale="0.3 0.3 0.3" 
        rotation="0 -90 0" 
        class="clickable" 
        shadow="cast: true">
      </a-entity>

      <!-- Fill point light for Rockruff (smaller & dimmer by half, smoother falloff) -->
      <a-entity
        id="rockruffFillLight"
        position="1 0.12 -2"
        light="type: point; color: #fff7e6; intensity: 0.6; distance: 1.0; decay: 1; castShadow: false">
      </a-entity>

      <!-- Subtle colored sudden point light behind Rockruff (dimmer than fill) -->
      <a-entity
        id="rockruffSuddenLight"
        position="1 0.3 -2.45"
        light="type: point; color: #a8d0ff; intensity: 0.25; distance: 0.9; decay: 1; castShadow: false">
      </a-entity>

      <!-- 2. Spotlight for Friendopede (Middle) -->
      <a-entity
        id="friendopedeLight"
        position="1 4 -4"
        rotation="-90 0 0"
        light="type: spot; color: #ffffff; intensity: 15; distance: 10; angle: 45; penumbra: 0.5; decay: 1; castShadow: true">
      </a-entity>
      <a-entity 
        id="friendopedeEntity" 
        gltf-model="#friendopede" 
        position="1 0 -4" 
        class="clickable" 
        shadow="cast: true">
      </a-entity>

      <!-- Fill point light for Friendopede (smaller & dimmer by half, smoother falloff) -->
      <a-entity
        id="friendopedeFillLight"
        position="1 0.12 -4"
        light="type: point; color: #fff7e6; intensity: 0.65; distance: 1.25; decay: 1; castShadow: false">
      </a-entity>

      <!-- Subtle colored sudden point light behind Friendopede (dimmer than fill) -->
      <a-entity
        id="friendopedeSuddenLight"
        position="1 0.3 -4.45"
        light="type: point; color: #ffd1e6; intensity: 0.3; distance: 1.0; decay: 1; castShadow: false">
      </a-entity>

      <!-- 3. Spotlight for Adora (Back) - raised and wider radius -->
      <a-entity
        id="adoraLight"
        position="1 6 -6"
        rotation="-90 0 0"
        light="type: spot; color: #ffffff; intensity: 18; distance: 20; angle: 60; penumbra: 0.5; decay: 1; castShadow: true">
      </a-entity>

      <!-- Fill point light near ground for Adora (dimmer than spotlight) -->
      <a-entity
        id="adoraFillLight"
        position="1 0.3 -6"
        light="type: point; color: #fff7e6; intensity: 4; distance: 6; decay: 1; castShadow: false">
      </a-entity>

      <!-- Subtle colored sudden point light behind Adora (dimmer than fill) -->
      <a-entity
        id="adoraSuddenLight"
        position="1 0.55 -6.5"
        light="type: point; color: #fff2d1; intensity: 0.8; distance: 1.8; decay: 1; castShadow: false">
      </a-entity>

      <a-entity 
        id="adoraEntity" 
        gltf-model="#Adora" 
        position="1 0.8 -6" 
        scale="0.08 0.08 0.08" 
        rotation="0 -90 0" 
        class="clickable" 
        shadow="cast: true">
      </a-entity>

      <!-- Camera Rig -->
      <a-entity id="cameraRig">
        <!-- Head -->
        <a-entity id="camera" camera look-controls wasd-controls position="0 1.6 0">
          <a-entity
            cursor="fuse: false; rayOrigin: mouse"
            raycaster="objects: .clickable"
            position="0 0 -1"
            geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.015"
            material="color: #00ff00; shader: flat; opacity: 0.5">
          </a-entity>
        </a-entity>

        <!-- Hands -->
        <a-entity 
            id="leftHand" 
            laser-controls="hand: left" 
            teleport-controls="cameraRig: #cameraRig; teleportOrigin: #camera; button: grip" 
            super-hands>
        </a-entity>
        <a-entity 
            id="rightHand" 
            laser-controls="hand: right" 
            teleport-controls="cameraRig: #cameraRig; teleportOrigin: #camera; button: trigger" 
            super-hands>
        </a-entity>
      </a-entity>

      <!-- Sky -->
      <a-sky src="#darksky"></a-sky>
    </a-scene>

    <script>
      (function() {
        const btn = document.getElementById('enterVrBtn');
        const lastBtn = document.getElementById('lastUpdatedBtn');
        const scene = document.querySelector('a-scene');

        if (!scene || !btn || !lastBtn) return;

        function updateButtonLabel() {
          const inVr = scene.is('vr-mode');
          btn.textContent = inVr ? 'Exit VR' : 'Enter VR';
          btn.setAttribute('aria-pressed', String(inVr));
        }

        scene.addEventListener('enter-vr', updateButtonLabel);
        scene.addEventListener('exit-vr', updateButtonLabel);

        btn.addEventListener('click', function () {
          if (scene.is('vr-mode')) {
            scene.exitVR();
          } else {
            scene.enterVR();
          }
        });

        // Show Enter VR button on supported devices
        if (navigator.xr && typeof navigator.xr.isSessionSupported === 'function') {
          navigator.xr.isSessionSupported('immersive-vr').then(function (supported) {
            btn.style.display = 'block';
            updateButtonLabel();
          }).catch(function () {
            btn.style.display = 'block';
          });
        } else {
          btn.style.display = 'block';
        }

        // --- Last-updated UI logic ---
        const formatter = new Intl.DateTimeFormat(undefined, {
          year: 'numeric', month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit', second: '2-digit'
        });

        function setLastUpdatedLabel(dateString) {
          const dt = dateString ? new Date(dateString) : new Date();
          const formatted = formatter.format(dt);
          lastBtn.innerHTML = 'Last changed<br><small>' + formatted + '</small>';
          lastBtn.style.display = 'block';
        }

        // Primary: try fetching Last-Modified header for same-origin index.html
        let lastKnown = null;
        function fetchLastModified() {
          // HEAD request to same URL; cache disabled to detect changes
          fetch(window.location.href, { method: 'HEAD', cache: 'no-store' })
            .then(response => {
              const header = response.headers.get('last-modified');
              if (header) {
                if (lastKnown !== header) {
                  lastKnown = header;
                  setLastUpdatedLabel(header);
                }
              } else {
                // fallback to document.lastModified if header missing
                const fallback = document.lastModified || new Date().toString();
                if (lastKnown !== fallback) {
                  lastKnown = fallback;
                  setLastUpdatedLabel(fallback);
                }
              }
            })
            .catch(() => {
              // network/CORS fallback: use document.lastModified
              const fallback = document.lastModified || new Date().toString();
              if (lastKnown !== fallback) {
                lastKnown = fallback;
                setLastUpdatedLabel(fallback);
              }
            });
        }

        // initial set from best available source
        fetchLastModified();

        // poll every 3 minutes (180000 ms) to detect updates
        const POLL_MS = 180000;
        const pollHandle = setInterval(fetchLastModified, POLL_MS);

        // Optional: when user clicks lastUpdatedBtn, copy timestamp to clipboard
        lastBtn.addEventListener('click', () => {
          const text = lastBtn.querySelector('small')?.textContent || '';
          if (!text) return;
          navigator.clipboard?.writeText(text).then(() => {
            const prev = lastBtn.innerHTML;
            lastBtn.textContent = 'Copied';
            setTimeout(() => { lastBtn.innerHTML = prev; }, 800);
          }).catch(() => { /* ignore */ });
        });

        // Clean up when scene is unloaded (if needed)
        window.addEventListener('beforeunload', () => clearInterval(pollHandle));
      })();
    </script>
  </body>
</html>
